<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đồng Hồ Bấm Giờ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
      font-family: 'Courier New', monospace;
    }
    .time-display {
      font-size: clamp(3rem, 11vw, 8.5rem);
      font-weight: 700;
      color: #000;
      letter-spacing: -0.02em;
      line-height: 1;
      width: 60vw;
      text-align: center;
      font-variant-numeric: tabular-nums;
      margin-top: 2rem;
    }
    .ms-display {
      font-size: clamp(1.2rem, 3.5vw, 3rem);
      font-weight: 400;
      color: #000;
      opacity: 0.45;
      letter-spacing: 0.05em;
      margin-top: 0.4rem;
      text-align: center;
    }
    .controls {
      display: flex;
      gap: 1.2rem;
      margin-top: 2.5rem;
    }
    .btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 2px solid #000;
      background: transparent;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #000;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.3;
    }
    .btn:hover { background: #000; color: #fff; }
    .btn:active { transform: scale(0.95); }
    .btn-main { background: #000; color: #fff; }
    .btn-main:hover { background: #333; }
    .btn-lap { border-color: #555; color: #555; }
    .btn-lap:hover { background: #555; color: #fff; }
    .btn-lap:disabled { border-color: #ddd; color: #ddd; cursor: default; }
    .btn-lap:disabled:hover { background: transparent; color: #ddd; }
    .btn-reset { border-color: #bbb; color: #bbb; }
    .btn-reset:hover { background: #bbb; color: #fff; }
    .status {
      margin-top: 1rem;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
      height: 16px;
    }
    .laps-section {
      width: 100%;
      max-width: 480px;
      margin-top: 2rem;
    }
    .laps-header {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #aaa;
      padding: 0 4px 8px;
      border-bottom: 1px solid #eee;
    }
    .laps-list {
      max-height: 260px;
      overflow-y: auto;
    }
    .lap-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 4px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .lap-num { color: #aaa; font-size: 12px; letter-spacing: 0.1em; min-width: 50px; }
    .lap-split { color: #555; font-size: 13px; }
    .lap-total { color: #000; font-weight: 700; }
    .lap-row.best .lap-split { color: #2a8a4a; }
    .lap-row.worst .lap-split { color: #c0392b; }
    .lap-badge {
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 2px 6px;
      border-radius: 20px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .badge-best { background: #e8f7ee; color: #2a8a4a; }
    .badge-worst { background: #fdecea; color: #c0392b; }
    .empty-msg {
      text-align: center;
      color: #ccc;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <div class="time-display" id="time">00:00:00</div>
  <div class="ms-display" id="ms">.000</div>
  <div class="controls">
    <button class="btn btn-main" id="btnStartStop" onclick="toggle()">BẮT ĐẦU</button>
    <button class="btn btn-lap" id="btnLap" onclick="recordLap()" disabled>MỐC</button>
    <button class="btn btn-reset" onclick="reset()">ĐẶT LẠI</button>
  </div>
  <div class="status" id="status"></div>

  <div class="laps-section" id="lapsSection" style="display:none;">
    <div class="laps-header">
      <span>Mốc</span>
      <span>Thời gian mốc</span>
      <span>Tổng cộng</span>
    </div>
    <div class="laps-list" id="lapsList"></div>
  </div>
  <div class="empty-msg" id="emptyMsg" style="display:none;">Bấm MỐC để ghi lại thời gian</div>

  <script>
    let running = false;
    let startTime = 0;
    let elapsed = 0;
    let raf;
    let laps = [];

    function pad(n, len) { return String(n).padStart(len, '0'); }

    function formatTime(ms) {
      const m = Math.floor(ms / 1000);
      const secs = m % 60;
      const mins = Math.floor(m / 60) % 60;
      const hrs = Math.floor(m / 3600);
      return pad(hrs, 2) + ':' + pad(mins, 2) + ':' + pad(secs, 2);
    }

    function formatMs(ms) { return '.' + pad(Math.floor(ms % 1000), 3); }

    function update() {
      const now = performance.now();
      const total = elapsed + (now - startTime);
      document.getElementById('time').textContent = formatTime(total);
      document.getElementById('ms').textContent = formatMs(total);
      raf = requestAnimationFrame(update);
    }

    function toggle() {
      const btn = document.getElementById('btnStartStop');
      const lapBtn = document.getElementById('btnLap');
      const status = document.getElementById('status');
      if (!running) {
        startTime = performance.now();
        running = true;
        btn.textContent = 'DỪNG';
        btn.style.background = '#222';
        lapBtn.disabled = false;
        status.textContent = 'đang chạy';
        if (laps.length === 0) {
          document.getElementById('emptyMsg').style.display = 'block';
          document.getElementById('lapsSection').style.display = 'none';
        }
        raf = requestAnimationFrame(update);
      } else {
        elapsed += performance.now() - startTime;
        running = false;
        cancelAnimationFrame(raf);
        btn.textContent = 'TIẾP TỤC';
        btn.style.background = '#000';
        lapBtn.disabled = true;
        status.textContent = 'đã dừng';
      }
    }

    function recordLap() {
      if (!running) return;
      const now = performance.now();
      const total = elapsed + (now - startTime);
      const prevTotal = laps.length > 0 ? laps[0].total : 0;
      const split = total - prevTotal;
      laps.unshift({ split, total, num: laps.length + 1 });
      renderLaps();
    }

    function renderLaps() {
      if (laps.length === 0) return;
      document.getElementById('emptyMsg').style.display = 'none';
      document.getElementById('lapsSection').style.display = 'block';

      const splits = laps.map(l => l.split);
      const minSplit = Math.min(...splits);
      const maxSplit = Math.max(...splits);

      const list = document.getElementById('lapsList');
      list.innerHTML = '';
      laps.forEach((lap) => {
        const isBest = laps.length > 1 && lap.split === minSplit;
        const isWorst = laps.length > 1 && lap.split === maxSplit;
        const row = document.createElement('div');
        row.className = 'lap-row' + (isBest ? ' best' : isWorst ? ' worst' : '');
        row.innerHTML =
          '<span class="lap-num">MỐC ' + pad(lap.num, 2) + '</span>' +
          '<span class="lap-split">' + formatTime(lap.split) + formatMs(lap.split) +
            (isBest ? ' <span class="lap-badge badge-best">nhanh nhất</span>' : '') +
            (isWorst ? ' <span class="lap-badge badge-worst">chậm nhất</span>' : '') +
          '</span>' +
          '<span class="lap-total">' + formatTime(lap.total) + '</span>';
        list.appendChild(row);
      });
    }

    function reset() {
      cancelAnimationFrame(raf);
      running = false;
      elapsed = 0;
      laps = [];
      const btn = document.getElementById('btnStartStop');
      btn.textContent = 'BẮT ĐẦU';
      btn.style.background = '#000';
      document.getElementById('btnLap').disabled = true;
      document.getElementById('time').textContent = '00:00:00';
      document.getElementById('ms').textContent = '.000';
      document.getElementById('status').textContent = '';
      document.getElementById('lapsSection').style.display = 'none';
      document.getElementById('emptyMsg').style.display = 'none';
      document.getElementById('lapsList').innerHTML = '';
    }
  </script>
</body>
</html>
